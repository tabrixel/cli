name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required to request the GitHub OIDC token for Trusted Publishing
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pack
        run: dotnet pack Tabrixel/Tabrixel.csproj -c Release -p:Version=$VERSION -o ./nupkg

      # Exchanges the GitHub OIDC token for a short-lived (1-hour) NuGet API key via the
      # Trusted Publishing policy configured on nuget.org. Run immediately before push so the
      # temporary key does not expire. No long-lived secret is stored in the repo.
      - name: NuGet login (Trusted Publishing → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # nuget.org account/profile name (not an email)

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
