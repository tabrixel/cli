name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/Tabrixel.slnx

      - name: Build
        run: dotnet build src/Tabrixel.slnx --no-restore -c Release

      - name: Test
        run: dotnet test src/Tabrixel.slnx --no-build -c Release
